<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Modo ADM - Delano & Istephany</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="admin-page">
    <section class="admin-login" id="adminLogin">
      <form class="admin-login-card" id="adminLoginForm">
        <span class="flower-logo large" aria-hidden="true"></span>
        <p class="eyebrow">Acesso restrito</p>
        <h1>Modo ADM</h1>
        <label>
          Usuário
          <input id="adminUser" type="text" autocomplete="username" required />
        </label>
        <label>
          Senha
          <input id="adminPassword" type="password" autocomplete="current-password" required />
        </label>
        <button class="button primary full" type="submit">Entrar</button>
        <p class="form-status" id="adminLoginStatus" role="status"></p>
      </form>
    </section>

    <main class="admin-shell is-locked" id="adminShell">
      <section class="admin-sidebar">
        <a class="admin-back" href="index.html">Voltar ao site</a>
        <div class="admin-title">
          <span class="flower-logo large" aria-hidden="true"></span>
          <div>
            <p class="eyebrow">Modo ADM</p>
            <h1>Editar site</h1>
          </div>
        </div>
        <p>
          Clique nos textos do preview e altere o conteúdo. Para fotos, use os
          campos que aparecem no próprio local da imagem. Ao terminar, salve todas
          as alterações.
        </p>
        <button class="button muted full" id="adminLogout" type="button">Sair do modo ADM</button>
        <button class="button primary full" id="adminSaveAll" type="button">Salvar todas as alterações</button>
        <button class="button muted full" id="adminClearChanges" type="button">Limpar edições salvas</button>
        <p class="form-status" id="adminSaveStatus" role="status"></p>
      </section>

      <section class="admin-preview-wrap">
        <div class="admin-tabs" role="tablist" aria-label="Visualizações do ADM">
          <button class="admin-tab is-active" type="button" data-admin-tab="edit">Editar</button>
          <button class="admin-tab" type="button" data-admin-tab="view">Visualização</button>
        </div>
        <iframe class="admin-frame is-active" id="sitePreview" title="Preview editável do site"></iframe>
        <iframe class="admin-frame" id="visitorPreview" title="Visualização do visitante"></iframe>
      </section>
    </main>

    <div class="crop-modal" id="cropModal" aria-hidden="true">
      <div class="crop-backdrop" id="cropCancelBackdrop"></div>
      <section class="crop-panel" role="dialog" aria-modal="true" aria-labelledby="cropTitle">
        <div class="crop-panel-head">
          <div>
            <p class="eyebrow">Ajustar foto</p>
            <h2 id="cropTitle">Recorte e enquadramento</h2>
          </div>
          <button class="modal-close" id="cropCancelTop" type="button" aria-label="Fechar">×</button>
        </div>
        <div class="crop-stage">
          <canvas id="cropCanvas"></canvas>
        </div>
        <label class="volume-row crop-zoom">
          <span>Zoom</span>
          <input id="cropZoom" type="range" min="1" max="3" step="0.01" value="1" />
        </label>
        <div class="crop-actions">
          <button class="button muted" id="cropCancel" type="button">Cancelar</button>
          <button class="button primary" id="cropSave" type="button">Salvar foto</button>
        </div>
      </section>
    </div>

    <script src="admin.js"></script>
  </body>
</html>
